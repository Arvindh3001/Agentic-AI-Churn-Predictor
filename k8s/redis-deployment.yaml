# ============================================================
# Redis 7 — Deployment + Service + PVC
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-redis
  namespace: churn-data
  labels:
    app: churn-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: churn-redis
  template:
    metadata:
      labels:
        app: churn-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly yes
            - --maxmemory 1gb
            - --maxmemory-policy allkeys-lru
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-storage
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1.5Gi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: churn-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: churn-redis
  namespace: churn-data
spec:
  selector:
    app: churn-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
