# ============================================================
# Kubernetes Secrets — TEMPLATE (do not commit real values)
# Replace <base64-encoded-value> with: echo -n 'value' | base64
#
# Apply:
#   kubectl apply -f k8s/secrets.yaml -n churn-app
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: churn-app-secrets
  namespace: churn-app
type: Opaque
data:
  # echo -n 'yourpassword' | base64
  postgres-password: <base64-encoded-postgres-password>
  jwt-secret-key: <base64-encoded-jwt-secret>
  openai-api-key: <base64-encoded-openai-key>
  anthropic-api-key: <base64-encoded-anthropic-key>
  langsmith-api-key: <base64-encoded-langsmith-key>
  slack-bot-token: <base64-encoded-slack-token>
---
apiVersion: v1
kind: Secret
metadata:
  name: churn-registry-credentials
  namespace: churn-app
type: kubernetes.io/dockerconfigjson
data:
  # kubectl create secret docker-registry churn-registry-credentials \
  #   --docker-server=ghcr.io \
  #   --docker-username=<github-username> \
  #   --docker-password=<github-pat> \
  #   --dry-run=client -o yaml
  .dockerconfigjson: <base64-encoded-docker-config>
