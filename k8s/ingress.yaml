# ============================================================
# Ingress — TLS termination via cert-manager
# Prerequisites:
#   - ingress-nginx controller installed
#   - cert-manager installed with a ClusterIssuer named "letsencrypt-prod"
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: churn-ingress
  namespace: churn-app
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # WebSocket support for agent streaming
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  tls:
    - hosts:
        - churn-platform.example.com
        - api.churn-platform.example.com
      secretName: churn-tls-cert
  rules:
    # Frontend
    - host: churn-platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: churn-frontend
                port:
                  number: 80
    # API + WebSocket
    - host: api.churn-platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: churn-api
                port:
                  number: 80
