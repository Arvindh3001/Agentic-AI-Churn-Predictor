# ============================================================
# Next.js Frontend — Deployment + Service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-frontend
  namespace: churn-app
  labels:
    app: churn-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: churn-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: churn-frontend
    spec:
      imagePullSecrets:
        - name: churn-registry-credentials
      containers:
        - name: frontend
          image: ghcr.io/your-org/churn-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: https://api.churn-platform.example.com
            - name: NEXT_PUBLIC_WS_URL
              value: wss://api.churn-platform.example.com
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: churn-frontend
  namespace: churn-app
spec:
  selector:
    app: churn-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
