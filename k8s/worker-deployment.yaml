# ============================================================
# Celery Worker — Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-worker
  namespace: churn-app
  labels:
    app: churn-worker
    tier: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: churn-worker
  template:
    metadata:
      labels:
        app: churn-worker
    spec:
      imagePullSecrets:
        - name: churn-registry-credentials
      containers:
        - name: worker
          image: ghcr.io/your-org/churn-worker:latest
          imagePullPolicy: Always
          env:
            - name: APP_ENV
              value: production
            - name: REDIS_URL
              value: redis://churn-redis:6379/0
            - name: CELERY_BROKER_URL
              value: redis://churn-redis:6379/1
            - name: CELERY_RESULT_BACKEND
              value: redis://churn-redis:6379/2
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: churn-app-secrets
                  key: openai-api-key
                  optional: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - celery_app
                - inspect
                - ping
                - -t
                - "5"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
