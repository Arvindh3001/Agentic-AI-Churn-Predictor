version: "3.9"

# ============================================================
# Churn Intelligence Platform — Full Local Dev Stack
#
# Start all services:
#   docker compose -f docker/docker-compose.yml up -d
#
# Start infra only (no app containers):
#   docker compose -f docker/docker-compose.yml up -d postgres redis chromadb mlflow
#
# Services & Ports:
#   postgres    :5432   — Primary relational store
#   redis       :6379   — Cache + Celery broker + agent state
#   chromadb    :8001   — Vector store (agent memory / RAG)
#   mlflow      :5001   — Experiment tracking + model registry
#   api         :8000   — FastAPI backend  (/docs for Swagger)
#   worker      —       — Celery workers (default + batch queues)
#   frontend    :3000   — Next.js UI
#   prometheus  :9090   — Metrics scraper
#   grafana     :3001   — Dashboards (admin / admin123)
# ============================================================

networks:
  churn_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
  mlflow_data:
  prometheus_data:
  grafana_data:

# ── Shared environment for all application containers ───────
x-app-env: &app-env
  DATABASE_URL: postgresql://churn_user:churn_pass@postgres:5432/churn_db
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  CHROMADB_HOST: chromadb
  CHROMADB_PORT: "8000"
  MLFLOW_TRACKING_URI: http://mlflow:5000
  JWT_SECRET_KEY: dev-secret-change-in-production
  APP_ENV: development

services:

  # ----------------------------------------------------------
  # PostgreSQL 17 — Primary relational store
  # ----------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: churn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: churn_user
      POSTGRES_PASSWORD: churn_pass
      POSTGRES_DB: churn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - churn_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U churn_user -d churn_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis 7 — Cache + Celery broker + agent state store
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: churn_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - churn_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # ChromaDB — Vector store for agent memory / RAG
  # ----------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: churn_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - ANONYMIZED_TELEMETRY=false
    networks:
      - churn_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # MLflow Tracking Server
  # ----------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: churn_mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlflow/artifacts
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://churn_user:churn_pass@postgres:5432/churn_db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    command: >
      mlflow server
        --backend-store-uri postgresql://churn_user:churn_pass@postgres:5432/churn_db
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0 --port 5000
    networks:
      - churn_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # FastAPI Backend
  # ----------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: churn-api:latest
    container_name: churn_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Hot-reload in dev: mount source, skip venv
      - ..:/app
      - /app/.venv
    environment:
      <<: *app-env
    networks:
      - churn_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ----------------------------------------------------------
  # Celery Worker
  # ----------------------------------------------------------
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    image: churn-worker:latest
    container_name: churn_worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ..:/app
      - /app/.venv
    environment:
      <<: *app-env
    networks:
      - churn_net

  # ----------------------------------------------------------
  # Next.js Frontend
  # ----------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    image: churn-frontend:latest
    container_name: churn_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    networks:
      - churn_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # Prometheus
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: churn_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - churn_net

  # ----------------------------------------------------------
  # Grafana
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: churn_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana_provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    networks:
      - churn_net
