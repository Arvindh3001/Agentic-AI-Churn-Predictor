version: "3.9"

# ============================================================
# Churn Intelligence Platform — Production Overrides
#
# Usage:
#   docker compose \
#     -f docker/docker-compose.yml \
#     -f docker/docker-compose.prod.yml \
#     up -d
#
# All values here override the base docker-compose.yml.
# Secrets should be injected via environment / vault, never
# hard-coded here.
# ============================================================

services:

  # ── API: production settings ─────────────────────────────
  api:
    image: ${REGISTRY:-ghcr.io/your-org}/churn-api:${IMAGE_TAG:-latest}
    # Remove dev volume mounts
    volumes: []
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_PROJECT: churn-platform-prod
    # Production: gunicorn + uvicorn workers
    command: >
      gunicorn app.main:app
        --workers 4
        --worker-class uvicorn.workers.UvicornWorker
        --bind 0.0.0.0:8000
        --timeout 120
        --access-logfile -
        --error-logfile -
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ── Worker: production settings ──────────────────────────
  worker:
    image: ${REGISTRY:-ghcr.io/your-org}/churn-worker:${IMAGE_TAG:-latest}
    volumes: []
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ── Frontend: production settings ───────────────────────
  frontend:
    image: ${REGISTRY:-ghcr.io/your-org}/churn-frontend:${IMAGE_TAG:-latest}
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.churn-platform.example.com}
      NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-wss://api.churn-platform.example.com}
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── PostgreSQL: production with backup ──────────────────
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-churn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-churn_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Grafana: disable anonymous access in prod ───────────
  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3001}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${SMTP_HOST:-}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM:-alerts@churn-platform.example.com}
